# Fenrir dogfoods its OWN local gate. Mirrors what templates/.pre-commit-config.yaml
# installs into consumer repos, scoped to this plugin's first-party Python (hooks/).
# Install: pre-commit install && pre-commit install --hook-type pre-push && pre-commit install --hook-type commit-msg
# This is the LOCAL gate; the merge gate is .github/workflows/ci.yml as a required check.
minimum_pre_commit_version: "3.5.0"
default_install_hook_types: [pre-commit, pre-push, commit-msg]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
        files: ^hooks/

  # Secret-scan lives HERE and only here (same rule the plugin ships to consumers).
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-json
      - id: check-yaml

  # Conventional commits (the plugin enforces these; so must this repo).
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  # Hook behavior tests on push. Full suite + mypy run in CI as the required check.
  - repo: local
    hooks:
      - id: pytest-hooks
        name: pytest-hooks
        entry: python3 -m pytest -q
        language: system
        pass_filenames: false
        stages: [pre-push]
