# Couche 0 — CI required status check: delivery-trace (GitHub Actions).
# The AUTHORITATIVE half of "mandatory tracking". The in-session tracking-guard hook gives
# fast local feedback (auto-creates a US); THIS check is the merge gate for traceability: a PR
# cannot merge unless its change REFERENCES a User Story (a `us-N`). Existence-on-board is
# verified only when a board is committed — but boards are LOCAL runtime state (git-ignored),
# so in practice this enforces "a US is referenced", not "that US exists" (honest scope).
#
# Add `delivery-trace` to branch-protection.tf required_checks to enforce it at merge.
# Job `name:` MUST equal that required_checks context.
#
# Tracing rule: at least one commit message OR the PR body references a `us-<N>` id. If a
# committed board is present the id must EXIST in it; normally none is committed (boards are
# local runtime state), so the check enforces only that a `us-<N>` is referenced.
name: delivery-trace

on:
  pull_request:
    branches: [main, dev, "release/**"]

jobs:
  delivery-trace:
    name: delivery-trace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }   # need the full range base..head for commit messages
      - name: every change is traced to a User Story
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 - <<'PY'
          import glob, json, os, re, subprocess, sys

          # Boards are per-project (data/boards/<slug>.json); also accept the legacy single file.
          board_files = sorted(glob.glob("dashboard/data/boards/*.json")) + (
              ["dashboard/data/board.json"] if os.path.exists("dashboard/data/board.json") else [])
          if not board_files:
              print("delivery-trace: no dashboard board file — nothing to enforce (PASS).")
              sys.exit(0)

          valid = set()
          for bp in board_files:
              try:
                  for s in json.load(open(bp)).get("stories", []):
                      if s.get("id"):
                          valid.add(s["id"])
              except (OSError, ValueError) as e:
                  print(f"delivery-trace: could not read {bp} ({e}) — failing closed.")
                  sys.exit(1)

          base, head = os.environ.get("BASE_SHA", ""), os.environ.get("HEAD_SHA", "")
          try:
              rng = f"{base}..{head}" if base and head else "HEAD~20..HEAD"
              commits = subprocess.run(["git", "log", "--format=%B", rng],
                                       capture_output=True, text=True, timeout=30).stdout
          except Exception:
              commits = ""
          haystack = commits + "\n" + (os.environ.get("PR_BODY") or "")

          refs = set(re.findall(r"\bus-\d+\b", haystack, re.IGNORECASE))
          refs = {r.lower() for r in refs}
          traced = refs & valid

          if traced:
              print(f"delivery-trace: PASS — change traced to {sorted(traced)}.")
              sys.exit(0)

          print("delivery-trace: FAIL — no commit message or PR body references a User Story "
                "that exists on the board.")
          print("Fix: reference the US id (e.g. 'us-42') in a commit or the PR body. "
                "Create/find it via the delivery-tracker subagent or the dashboard board CLI.")
          if refs:
              print(f"  (referenced but not on the board: {sorted(refs)})")
          sys.exit(1)
          PY
