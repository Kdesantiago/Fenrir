# Couche 0 — Azure DevOps PR validation. Wire as a Build Validation branch policy
# (templates/azure-branch-policy.tf) so it is REQUIRED. WORKSPACE-CORRECT: one root uv.lock,
# so install + test run ONCE at the repo root (no per-service matrix).
trigger:
  branches:
    include: [main, dev, "release/*"]
pr:
  branches:
    include: [main, dev, "release/*"]

pool:
  vmImage: ubuntu-latest

variables:
  pyVersion: "3.12"

stages:
  - stage: test
    displayName: test
    jobs:
      - job: test
        steps:
          - task: UsePythonVersion@0
            inputs: { versionSpec: "$(pyVersion)" }
          - script: |
              if [ -f uv.lock ]; then pip install uv && uv sync --all-packages --dev; else pip install -e ".[dev]" || pip install -r requirements-dev.txt || pip install -r requirements.txt; fi
            displayName: install (uv workspace at root, else pip)
          - script: |
              if [ -f uv.lock ]; then uv run pytest --cov=src --cov-report=term-missing --cov-fail-under=80; else pytest --cov=src --cov-report=term-missing --cov-fail-under=80; fi
            displayName: pytest + coverage
          - script: |
              if [ -f uv.lock ]; then uv run ruff check src && uv run mypy src || true; fi
            displayName: type + lint (advisory)

  - stage: sast
    displayName: sast
    dependsOn: []
    jobs:
      - job: sast
        steps:
          - script: pipx run semgrep scan --config .semgrep.yml --severity ERROR --error
            displayName: Semgrep (ERROR only, curated config)
          - script: pipx run cyclonedx-bom -o sbom.json
            displayName: SBOM
          - publish: sbom.json
            artifact: sbom
          - script: |
              if [ -f uv.lock ]; then pip install uv && uv export --format requirements-txt --no-emit-workspace --no-dev | pipx run pip-audit -r /dev/stdin; else echo "no uv.lock — skipping"; fi
            displayName: dependency audit (root uv.lock)

  - stage: build
    displayName: build
    dependsOn: []
    jobs:
      - job: build
        steps:
          - script: |
              if [ -f Dockerfile ]; then docker build -t app:ci .; else echo "no Dockerfile — non-container repo; build passes."; fi
            displayName: docker build (only when containerized)
