# Repo ROOT — DEV TOOLING ONLY. This is NOT a Python package and NOT a uv workspace.
# It carries shared lint/type/test config so every module under src/<module>/ is graded the
# same way. There is NO root uv.lock and NO shared venv: each module in src/<module>/ is a
# SELF-CONTAINED project with its own pyproject.toml, its own .venv, and its own lockfile.
# Per-module dev loop:   cd src/<module> && uv sync && cp .env.example .env
# (See ADR 0005 for why the layout is flat-and-independent, not a uv workspace.)
#
# /fenrir:init renames {{PROJECT_NAME}} and emits one src/<module>/ per declared service.

[tool.ruff]
target-version = "py39"
line-length = 100
# Each module is its own project; lint them where they live.
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "C4"]

[tool.ruff.lint.isort]
# Flat module-local layout: each module's import root is src/<module>/, so its top-level
# packages (core/ api/ services/ schemas/) and single-file modules (main) are FIRST-PARTY,
# not third-party. Without this, ruff's import sorter splits them from stdlib/third-party
# incorrectly. These names are stable across every module (the ChatBot_IC convention).
known-first-party = ["core", "api", "services", "schemas", "main"]

[tool.mypy]
# Runtime floor is 3.9 (requires-python/ruff target), but mypy itself only supports
# python_version >= 3.10; 3.10 is a safe superset for type-checking 3.9 code.
python_version = "3.10"
strict = true
# Flat module-local layout: run from inside src/<module>/ where THIS dir is the import root.
# explicit_package_bases + an empty mypy_path stop mypy double-counting the module both as a
# top-level package (because src/<module>/__init__.py exists) and as the bare import root.
explicit_package_bases = true
namespace_packages = true
mypy_path = "."

[tool.pytest.ini_options]
addopts = "-q"
# DO NOT set testpaths=["src"] here. This root pyproject is dev-tooling-only, not a package and
# not a uv workspace (ADR 0005): each src/<module>/ is a self-contained project whose tests use
# module-local top-level imports (`from core.settings import settings`) that ONLY resolve when
# pytest runs from INSIDE that module dir. CI runs pytest per module
# (`cd src/<module> && uv run pytest`), where this shared config is inherited and the module dir is
# the import root.
# A bare root-run `pytest` would otherwise recurse into src/<module>/tests and raise
# `ModuleNotFoundError: No module named 'core'` (red forever). norecursedirs keeps a root-run
# pytest from collecting any module's tests, so it is a harmless dev-tooling sanity run that
# collects nothing from src/ rather than failing. Module tests are run per module by CI.
norecursedirs = ["src", ".venv", "*.egg", "build", "dist"]

[tool.coverage.run]
# Coverage is measured per module from inside src/<module>/ (the package roots are core/ api/
# services/ schemas/ — flat in each module), never `source=["src"]` from the repo root, which
# would have no importable `src` package and mismeasure across modules.
branch = true
